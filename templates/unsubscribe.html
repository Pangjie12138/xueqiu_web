<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取消订阅</title>
<style>
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f5f5f5; display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .card {
    background: white; border-radius: 16px; padding: 40px; text-align: center;
    max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  .icon { font-size: 48px; margin-bottom: 16px; }
  h2 { font-size: 20px; margin-bottom: 8px; color: #333; }
  p { font-size: 14px; color: #666; line-height: 1.6; }
  a { color: #667eea; text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="card">
  {% if success %}
    <div class="icon">👋</div>
    <h2>已取消订阅</h2>
    <p>你将不再收到该组合的调仓通知邮件。</p>
    <p style="margin-top:16px"><a href="/">如需重新订阅，点这里 →</a></p>
  {% else %}
    <div class="icon">🤔</div>
    <h2>链接无效</h2>
    <p>该取消订阅链接已失效或已被使用。</p>
    <p style="margin-top:16px"><a href="/">返回首页 →</a></p>
  {% endif %}
</div>
</body>
</html>
