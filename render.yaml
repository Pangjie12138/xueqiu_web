services:
  - type: web
    name: xueqiu-monitor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --preload
    envVars:
      - key: XUEQIU_COOKIE
        sync: false
      - key: SMTP_HOST
        value: smtp.qq.com
      - key: SMTP_PORT
        value: "465"
      - key: SENDER_EMAIL
        sync: false
      - key: SMTP_AUTH_CODE
        sync: false
      - key: BASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11.0"
